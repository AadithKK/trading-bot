<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        .content {
            padding: 40px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #f8f9fa;
            border-left: 4px solid #2a5298;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #2a5298;
        }
        .stat-card.positive .value { color: #28a745; }
        .stat-card.negative .value { color: #dc3545; }
        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 40px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #999;
            font-size: 0.9em;
            border-top: 1px solid #eee;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Trading Bot Dashboard</h1>
            <p>Local Paper Trading System - Live Performance</p>
        </div>
        <div class="content" id="content">
            <div class="loading">Loading dashboard data...</div>
        </div>
        <div class="footer">
            Last updated: <span id="lastUpdate">Never</span>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('No data available yet');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        ⚠️ No trading data available yet. Run the bot first.
                    </div>
                `;
            }
        }

        function renderDashboard(data) {
            const latest = data.latest || {};
            const history = data.history || [];

            const pnlClass = (latest.pnl || 0) >= 0 ? 'positive' : 'negative';
            const pnlSign = (latest.pnl || 0) >= 0 ? '+' : '';

            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Current Equity</h3>
                        <div class="value">$${(latest.equity || 0).toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Available Cash</h3>
                        <div class="value">$${(latest.cash || 0).toFixed(2)}</div>
                    </div>
                    <div class="stat-card ${pnlClass}">
                        <h3>Total P&L</h3>
                        <div class="value">${pnlSign}$${(latest.pnl || 0).toFixed(2)}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Win Rate</h3>
                        <div class="value">${(latest.win_rate || 0).toFixed(1)}%</div>
                    </div>
                    <div class="stat-card">
                        <h3>Trades Executed</h3>
                        <div class="value">${latest.trades || 0}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Last Run</h3>
                        <div class="value" style="font-size: 0.9em; margin-top: 10px;">
                            ${latest.timestamp ? new Date(latest.timestamp).toLocaleString() : 'Never'}
                        </div>
                    </div>
                </div>
            `;

            if (history.length > 1) {
                html += `<div class="chart-container"><canvas id="equityChart"></canvas></div>`;
            }

            document.getElementById('content').innerHTML = html;

            if (latest.timestamp) {
                document.getElementById('lastUpdate').textContent =
                    new Date(latest.timestamp).toLocaleString();
            }

            // Draw equity chart if data available
            if (history.length > 1) {
                drawEquityChart(history);
            }
        }

        function drawEquityChart(history) {
            const ctx = document.getElementById('equityChart').getContext('2d');
            const labels = history.map(h => new Date(h.timestamp).toLocaleDateString());
            const equityData = history.map(h => h.equity);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Account Equity',
                        data: equityData,
                        borderColor: '#2a5298',
                        backgroundColor: 'rgba(42, 82, 152, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#2a5298'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return '$' + value.toFixed(0);
                                }
                            }
                        }
                    }
                }
            });
        }

        // Load dashboard on page load and refresh every 30 seconds
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
